
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.build
    container_name: frontend-build
    volumes:
      - frontend_dist:/dist
    restart: "no"
    networks:
      - nginx-network

  nginx:
    image: nginx:alpine
    container_name: nginx-shop
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - ./logs:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_completed_successfully
      flask-app:
        condition: service_started
    networks:
      - nginx-network

  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-app
    volumes:
      - ./:/app
      - ./uploads:/app/uploads
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - nginx-network

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword-new123
      MYSQL_DATABASE: nginx_shop
      MYSQL_USER: guopengfei_learning
      MYSQL_PASSWORD: Gpf_learning
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - nginx-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword-new123"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - nginx-network
    command: redis-server --appendonly yes --requirepass Gpf_learning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Gpf_learning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  frontend_dist:

networks:
  nginx-network:
    driver: bridge
